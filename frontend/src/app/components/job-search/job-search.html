<div class="container-fluid py-4">
  <div class="card shadow-sm border-0 mb-4 p-3 bg-white">
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label small fw-bold">Job Role</label>
        <input type="text" [(ngModel)]="filters.title" class="form-control" placeholder="e.g. Java Developer">
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold">Location</label>
        <input type="text" [(ngModel)]="filters.location" class="form-control" placeholder="e.g. Bhopal">
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold">Experience (Yrs)</label>
        <input type="number" [(ngModel)]="filters.experience" class="form-control" placeholder="0">
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-bold">Job Type</label>
        <select [(ngModel)]="filters.jobType" class="form-select">
          <option value="">All Types</option>
          <option value="Full-time">Full-time</option>
          <option value="Remote">Remote</option>
          <option value="Contract">Contract</option>
        </select>
      </div>
      <div class="col-md-3">
        <button (click)="searchJobs()" class="btn btn-primary w-100 fw-bold">
          <i class="fas fa-search me-2"></i> Find Jobs
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div class="row" *ngIf="!isLoading">
    <div class="col-12" *ngFor="let job of jobs">
      <div class="card shadow-sm border-0 mb-3 job-card">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h5 class="fw-bold text-primary mb-1">{{ job.title }}</h5>
            <p class="text-muted mb-2 small">
              <i class="fas fa-building me-1"></i> {{ job.companyName }} | 
              <i class="fas fa-map-marker-alt me-1"></i> {{ job.location }}
            </p>
            <div class="d-flex gap-2">
              <span class="badge bg-light text-dark border">{{ job.jobType }}</span>
              <span class="badge bg-light text-dark border">{{ job.experience }} Yrs Exp</span>
              <span class="badge bg-success-subtle text-success">₹{{ job.salary }}</span>
            </div>
          </div>
          <div class="text-end">
            <button [routerLink]="['/jobseeker/menu/job-details', job.id]" class="btn btn-outline-primary me-2 btn-sm">View Details</button>
    
  <button [routerLink]="['/jobseeker/menu/applyjob']" 
        [queryParams]="{ jobId: job.id }" 
        class="btn btn-primary btn-sm">
  Apply Now
</button>

<button (click)="toggleSaveJob(job)" 
          class="btn btn-sm ms-2 px-3 transition-all" 
          [ngClass]="job.isSaved ? 'btn-success' : 'btn-outline-secondary'">
    <i [class]="job.isSaved ? 'fas fa-check-circle me-1' : 'far fa-bookmark me-1'"></i>
    {{ job.isSaved ? 'Saved' : 'Save Job' }}
  </button>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 text-center py-5" *ngIf="jobs.length === 0">
      <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" alt="No jobs" style="width: 150px; opacity: 0.5;">
      <h5 class="text-muted mt-3">No jobs found matching your criteria.</h5>
    </div>
  </div>
</div>
