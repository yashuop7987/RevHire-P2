<div class="container py-5">
  <div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 600px;">
    <h3 class="fw-bold text-primary mb-4">Complete Application</h3>

    <div class="mb-4">
      <label class="form-label fw-bold">Resume Option</label>
      <div class="d-flex gap-4">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="resOpt" [(ngModel)]="useSaved" [value]="true">
          <label class="form-check-label">Use Saved Profile</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="resOpt" [(ngModel)]="useSaved" [value]="false">
          <label class="form-check-label">Upload New File</label>
        </div>
      </div>
    </div>

    <div class="mb-4" *ngIf="!useSaved">
      <label class="form-label">Attach PDF Resume</label>
      <input type="file" class="form-control" (change)="onFileSelected($event)" accept=".pdf">
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold">Cover Letter (Optional)</label>
      <textarea class="form-control" name="cl" rows="4" [(ngModel)]="coverLetter" 
                placeholder="Briefly explain why you are a good fit..."></textarea>
    </div>

    <button (click)="submitApplication()" 
        class="btn btn-primary btn-lg w-100" 
        [disabled]="isSubmitting || !jobId || !seekerId">
  <i class="fas fa-paper-plane me-2"></i>
  {{ (jobId && seekerId) ? 'Submit Application' : 'Loading Application Data...' }}
</button>
  </div>
</div>
