<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold"><i class="fas fa-bookmark text-primary me-2"></i>Saved Jobs</h3>
    <span class="badge bg-primary px-3 py-2">{{ savedJobs.length }} Jobs Saved</span>
  </div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div class="row" *ngIf="!isLoading">
    <div class="col-12" *ngFor="let job of savedJobs">
      <div class="card shadow-sm border-0 mb-3">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h5 class="fw-bold text-primary mb-1">{{ job.title }}</h5>
            <p class="text-muted mb-0 small">{{ job.companyName }} | {{ job.location }}</p>
          </div>
          <div class="text-end">
            <button [routerLink]="['/jobseeker/menu/job-details', job.id]" class="btn btn-sm btn-outline-primary me-2">View</button>
            <button (click)="unsaveJob(job.id)" class="btn btn-sm btn-dangerr">
              <i class="fas fa-trash me-1"></i>Remove
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 text-center py-5" *ngIf="savedJobs.length === 0">
      <i class="far fa-folder-open fa-3x text-muted mb-3"></i>
      <h5 class="text-muted">You haven't saved any jobs yet.</h5>
      <a routerLink="/jobseeker/menu/search" class="btn btn-primary mt-2">Browse Jobs</a>
    </div>
  </div>
</div>
