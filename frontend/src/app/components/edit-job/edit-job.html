<div class="container py-5" *ngIf="!isLoading">
  <div class="card shadow p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="m-0 text-primary">Edit Job Posting</h3>
      <button class="btn btn-outline-secondary btn-sm" (click)="goBack()">Cancel</button>
    </div>

    <form [formGroup]="editForm" (ngSubmit)="onUpdate()">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-bold">Job Title</label>
          <input type="text" formControlName="title" class="form-control">
        </div>

        <div class="col-12">
          <label class="form-label fw-bold">Description</label>
          <textarea formControlName="description" class="form-control" rows="5"></textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">Required Skills</label>
          <input type="text" formControlName="skills" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">Experience (Years)</label>
          <input type="number" formControlName="experienceYears" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">Education</label>
          <input type="text" formControlName="education" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">Salary (LPA)</label>
          <input type="number" step="0.1" formControlName="salary" class="form-control">
        </div>

        <div class="col-md-4">
          <label class="form-label fw-bold">Location</label>
          <input type="text" formControlName="location" class="form-control">
        </div>

        <div class="col-md-4">
          <label class="form-label fw-bold">Job Type</label>
          <select formControlName="jobType" class="form-select">
            <option value="Full-time">Full-time</option>
            <option value="Contract">Contract</option>
            <option value="Part-time">Part-time</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label fw-bold">Deadline</label>
          <input type="datetime-local" formControlName="deadline" class="form-control">
        </div>

        <div class="col-12 mt-4">
          <button type="submit" class="btn btn-success w-100 py-2 fw-bold" [disabled]="editForm.invalid">
            Update Job Details
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
