<div class="container-fluid py-4">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="fas fa-search"></i></span>
            <input type="text" class="form-control border-start-0" 
                   placeholder="Search by name or job title..." 
                   [(ngModel)]="searchTerm" (input)="applyFilters()">
          </div>
        </div>
        <div class="col-md-4">
          <select class="form-select" [(ngModel)]="statusFilter" (change)="applyFilters()">
            <option value="ALL">All Statuses</option>
            <option value="APPLIED">Applied</option>
            <option value="SHORTLISTED">Shortlisted</option>
            <option value="REJECTED">Rejected</option>
          </select>
        </div>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th>Applicant</th>
            <th>Job Role</th>
            <th>Status</th>
            <th class="text-end pe-4">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let app of filteredApplications">
            <td>
              <div class="fw-bold">{{ app.jobSeeker?.name }}</div>
              <div class="text-muted small">{{ app.jobSeeker?.email }}</div>
            </td>
            <td>{{ app.job?.title }}</td>
            <td>
              <span class="badge rounded-pill px-3 py-2" 
                    [ngClass]="{'bg-success': app.status === 'SHORTLISTED', 'bg-warning text-dark': app.status === 'APPLIED', 'bg-danger': app.status === 'REJECTED'}">
                {{ app.status }}
              </span>
            </td>
            <td class="text-end pe-4">
              <button class="btn btn-sm btn-outline-success me-1" (click)="updateStatus(app.id, 'SHORTLISTED')">Shortlist</button>
              <button class="btn btn-sm btn-outline-danger" (click)="updateStatus(app.id, 'REJECTED')">Reject</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
