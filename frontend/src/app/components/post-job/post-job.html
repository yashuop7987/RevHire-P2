<div class="container py-5">
  <div class="card shadow p-4">
    <h3 class="mb-4 text-center">Post a New Job</h3>

    <form [formGroup]="jobForm" (ngSubmit)="onSubmit()">

      <div class="row g-3">

        <!-- Job Title -->
        <div class="col-12">
          <label class="form-label">Job Title</label>
          <input type="text" formControlName="title" class="form-control">
          <small class="text-danger" *ngIf="jobForm.get('title')?.touched && jobForm.get('title')?.invalid">
            Job title is required
          </small>
        </div>

        <!-- Description -->
        <div class="col-12">
          <label class="form-label">Description (Max 3000 chars)</label>
          <textarea formControlName="description" class="form-control" rows="4"></textarea>
          <small class="text-danger"
                 *ngIf="jobForm.get('description')?.touched && jobForm.get('description')?.invalid">
            Description is required (Max 3000 characters)
          </small>
        </div>

        <!-- Skills -->
        <div class="col-md-6">
          <label class="form-label">Required Skills</label>
          <input type="text" formControlName="skills" class="form-control"
                 placeholder="Java, Spring Boot, Angular">
          <small class="text-danger"
                 *ngIf="jobForm.get('skills')?.touched && jobForm.get('skills')?.invalid">
            Skills are required
          </small>
        </div>

        <!-- Experience -->
        <div class="col-md-6">
          <label class="form-label">Experience (Years)</label>
          <input type="number" formControlName="experienceYears" class="form-control">
          <small class="text-danger"
                 *ngIf="jobForm.get('experienceYears')?.touched && jobForm.get('experienceYears')?.invalid">
            Experience must be 0 or more
          </small>
        </div>

        <!-- Education -->
        <div class="col-md-6">
          <label class="form-label">Education</label>
          <input type="text" formControlName="education" class="form-control">
        </div>

        <!-- Salary -->
        <div class="col-md-6">
          <label class="form-label">Salary</label>
          <input type="number" step="0.01" formControlName="salary" class="form-control">
          <small class="text-danger"
                 *ngIf="jobForm.get('salary')?.touched && jobForm.get('salary')?.invalid">
            Salary must be positive
          </small>
        </div>

        <!-- Job Type -->
        <div class="col-md-6">
          <label class="form-label">Job Type</label>
          <select formControlName="jobType" class="form-select">
            <option value="">Select Type</option>
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Contract">Contract</option>
            <option value="Internship">Internship</option>
          </select>
        </div>

        <!-- Location -->
        <div class="col-md-6">
          <label class="form-label">Location</label>
          <input type="text" formControlName="location" class="form-control">
        </div>

        <!-- Deadline -->
        <div class="col-md-6">
          <label class="form-label">Application Deadline</label>
          <input type="datetime-local" formControlName="deadline" class="form-control">
        </div>

        <!-- Submit Button -->
        <div class="col-12 mt-4">
          <button type="submit"
                  [disabled]="jobForm.invalid"
                  class="btn btn-primary w-100">
            Post Job
          </button>
        </div>

      </div>
    </form>
  </div>
</div>
